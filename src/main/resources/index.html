<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>ShopEase</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Cart</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Discover Your Style</h2>
        <p>Latest trends at unbeatable prices</p>
    </div>
</section>

<div class="container">
    <h2>Featured Products</h2>
    <br>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1526178613658-3f1622045557">
            <div class="card-content">
                <h3>Stylish Shoes</h3>
                <p class="price">₹2,999</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1514996937319-344454492b37">
            <div class="card-content">
                <h3>Smart Watch</h3>
                <p class="price">₹5,499</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">
            <div class="card-content">
                <h3>Casual Jacket</h3>
                <p class="price">₹3,799</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
            <div class="card-content">
                <h3>Backpack</h3>
                <p class="price">₹1,999</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
        </div>

    </div>
</div>
</html>
